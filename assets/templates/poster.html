<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Spread Capital Graphics Renderer</title>

    <link rel="stylesheet" href="poster.css">

</head>

<body class="engine-renderer">

    <div id="canvas-viewport">

        <!-- ===================================================== -->
        <!-- BACKGROUND LAYERS                                     -->
        <!-- ===================================================== -->

        <div id="background-layer" class="background"></div>

        <div class="gradient"></div>

        <div class="gold-circle"></div>

        <div class="blue-wave"></div>

        <div class="gold-line"></div>


        <!-- ===================================================== -->
        <!-- HEADER                                                -->
        <!-- ===================================================== -->

        <header id="header">

            <div id="brand-zone">

                <img
class="brand-logo-img"
src="file:///opt/spread-capital/assets/branding/logo.png"><!-- renderer.js injects logo -->

            </div>

        </header>


        <!-- ===================================================== -->
        <!-- MAIN CONTENT                                          -->
        <!-- ===================================================== -->

        <main id="main-layout">

            <!-- LEFT COLUMN -->

            <section id="left-column">

                <section id="headline-zone">

                    <h1
                        id="headline"
                        class="render-headline">
                    </h1>

                    <h2
                        id="subheadline"
                        class="render-subheadline">
                    </h2>

                    <p
                        id="caption"
                        class="render-caption">
                    </p>

                </section>


                <section id="features-zone">

                    <ul
                        id="feature-list"
                        class="feature-list">
                    </ul>

                </section>


                <section id="cta-zone">

                    <div
                        id="cta-button"
                        class="cta-button-element">
                    </div>

                </section>

            </section>


            <!-- RIGHT COLUMN -->

            <aside id="right-column">

                <div id="hero-zone">

                    <!-- renderer.js injects hero image -->

                </div>

            </aside>

        </main>


        <!-- ===================================================== -->
        <!-- FOOTER                                                -->
        <!-- ===================================================== -->

        <footer id="footer">

            <!-- Contact Ribbon -->

            <section id="contact-zone">

                <div
                    id="contact-grid"
                    class="contact-grid">
                </div>

            </section>

            <!-- Gold Footer -->

            <section class="footer-bar">

                <div
                    id="footer-tagline">

                    FINANCING YOUR GROWTH

                </div>

            </section>

        </footer>

    </div>

    <script src="renderer.js"></script>

</body>

</html>
