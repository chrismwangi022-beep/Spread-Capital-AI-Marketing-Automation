<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Spread Capital Graphics Renderer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="poster.css">
</head>

<body class="engine-renderer">

    <div id="canvas-viewport">

        <div id="background-layer" class="background"></div>
        <div class="gradient"></div>
        
        <div class="letterhead-watermark"></div>
        <div class="gold-circle"></div>
        <div class="blue-wave"></div>
        <div class="gold-line"></div>

        <header id="header">
            <div id="brand-zone">
                <img class="brand-logo-img" src="file:///opt/spread-capital/assets/branding/logo.png">
            </div>
        </header>

        <main id="main-layout">

            <section id="left-column">
                
                <section id="headline-zone">
                    <h1 id="headline" class="render-headline"></h1>
                    <h2 id="subheadline" class="render-subheadline"></h2>
                    <p id="caption" class="render-caption"></p>
                </section>

                <section id="features-zone">
                    <ul id="feature-list" class="feature-list">
                        </ul>
                </section>

                <section id="cta-zone">
                    <div id="cta-button" class="cta-button-element"></div>
                </section>

            </section>

            <aside id="right-column">
                <div id="hero-zone">
                    </div>
            </aside>

        </main>

        <footer id="footer">

            <div class="brand-geometric-stripe">
                <div class="stripe-segment sky-blue-left"></div>
                <div class="stripe-segment dark-blue-center"></div>
                <div class="stripe-segment sky-blue-right"></div>
            </div>

            <section id="contact-zone">
                <div id="contact-grid" class="contact-grid">
                    </div>
            </section>

            <section class="footer-bar">
                <div id="footer-tagline">
                    FINANCING YOUR GROWTH
                </div>
            </section>

        </footer>

    </div>

    <script src="renderer.js"></script>

</body>

</html>
